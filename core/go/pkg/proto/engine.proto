syntax = "proto3";

package io.kaleido.paladin.kata.engine;
option go_package = "pkg/proto/engine";
import "to_domain.proto";

message NonceAssigned {
    string id = 1;
    string contract_address = 2;
    string transaction_id = 3;
    int64 nonce = 4;
}

message TransactionSubmitted {
    string id = 1;
    string contract_address = 2;
    string transaction_id = 3;
    bytes hash = 4;
}

message TransactionDispatched {
    string id = 1;
    string contract_address = 2;
    string transaction_id = 3;
    bytes post_assemble_hash = 4;
    string signer = 5;
}

message TransactionConfirmed {
    enum Outcome {
        OUTCOME_UNSPECIFIED = 0;
        OUTCOME_SUCCESS = 1;
        OUTCOME_REVERTED = 2;
    }
    string id = 1;
    string contract_address = 2;
    string transaction_id = 3;
    int64 nonce = 4;
    Outcome outcome = 5;
    bool will_retry = 6;
    bytes revert_reason = 7;
    string failure_message = 8;
}

enum RejectionReason {
    BLOCK_HEIGHT_TOLERANCE = 0;         // sender and receiver block heights differ by more than the configured tolerance
    NOT_CURRENT_DELEGATE = 1;           // receiver does not recognise the sender as its current active coordinator/delegate
    TRANSACTION_UNKNOWN = 2;            // receiver does not recognise the transaction (likely already cleaned up)
    ENDORSER_IS_ACTIVE_COORDINATOR = 3; // endorser is currently the active coordinator and will not accept requests from a different coordinator
}

message EndorsementRequest {
    io.kaleido.paladin.toolkit.AttestationRequest attestation_request = 1;
    string idempotency_key = 2;
    string transaction_id = 3;
    string contract_address = 4;
    string party = 5;
    io.kaleido.paladin.toolkit.TransactionSpecification transaction_specification = 6;
    repeated io.kaleido.paladin.toolkit.ResolvedVerifier verifiers = 7;
    repeated io.kaleido.paladin.toolkit.AttestationResult signatures = 8;
    repeated io.kaleido.paladin.toolkit.EndorsableState inputStates = 9;
    repeated io.kaleido.paladin.toolkit.EndorsableState readStates = 10;
    repeated io.kaleido.paladin.toolkit.EndorsableState outputStates = 11;
    repeated io.kaleido.paladin.toolkit.EndorsableState infoStates = 12;
    int64 expiry_time_unix_ms = 13;
    int64 coordinator_block_height = 14;
    int64 block_height_tolerance = 15;
}

message EndorsementResponse {
    string transaction_id = 1;
    string idempotency_key = 2;
    string contract_address = 3;
    optional io.kaleido.paladin.toolkit.AttestationResult endorsement = 4;
    optional string revert_reason = 5;
    string party = 6;
    string attestation_request_name = 7;
}

message EndorsementRejection {
    string transaction_id = 1;
    string idempotency_key = 2;
    string contract_address = 3;
    string party = 4;
    string attestation_request_name = 5;
    RejectionReason rejection_reason = 6;
    int64 coordinator_block_height = 7;
    int64 endorser_block_height = 8;
    int64 block_height_tolerance = 9;   // the tolerance the coordinator was configured with, for diagnostic logging
}

message DelegationRequest {
    string transaction_id = 1;
    string delegate_node_id = 2;
    string delegation_id = 3; //this is used to correlate the acknowledgement back to the delegation. unlike the transport message id / correlation id, this is not unique across retries
    bytes private_transaction = 4; //json serialized copy of the in-memory private transaction object
    int64 originator_block_height = 5; // the originator's block height upon which this delegation was calculated
}

message DelegationResponse {
    repeated string transaction_ids = 1;
    repeated int64 errors = 2; // Every delegate could have a different result. Allow optional enum error per transaction
    string delegate_node_id = 3;
    string delegation_id = 4; // this is used to correlate the acknowledgement back to the delegation. unlike the transport message id / correlation id, this is not unique across retries
    string contract_address = 5;
}

message DelegationRejection {
    string delegate_node_id = 1;
    string delegation_id = 2;           // correlates the rejection back to the delegation request
    string contract_address = 3;
    string active_coordinator = 4;      // the rejecting coordinator's belief of who is currently active, so the originator can fast-redirect
    RejectionReason rejection_reason = 5;
    int64 originator_block_height = 6;  // the originator's block height echoed from the request
    int64 coordinator_block_height = 7; // the coordinator's block height at the time of rejection
    int64 block_height_tolerance = 8;   // the tolerance the coordinator was configured with
}

message CoordinatorHandoverRequest {
    string from_node = 1;
    string contract_address = 2;
}

message AssembleRequest {
    string transaction_id = 1;
    string assemble_request_id = 2;
    string contract_address = 3;
    bytes pre_assembly = 5;
    bytes state_locks = 6;
    int64 coordinator_block_height = 7;
    int64 expiry_time_unix_ms = 8;
    int64 block_height_tolerance = 9;
}

message AssembleResponse {
    string transaction_id = 1;
    string assemble_request_id = 2;
    string contract_address = 3;
    bytes post_assembly = 4;
    bytes pre_assembly = 5;
}

message AssembleError {
    string transaction_id = 1;
    string assemble_request_id = 2;
    string contract_address = 3;
    string error_message = 4;
}

message EndorsementError {
    string transaction_id = 1;
    string idempotency_key = 2;
    string contract_address = 3;
    string error_message = 4;
    string party = 5;
    string attestation_request_name = 6;
}

message AssembleRejection {
    string transaction_id = 1;
    string assemble_request_id = 2;
    string contract_address = 3;
    RejectionReason rejection_reason = 4;
    int64 coordinator_block_height = 5;
    int64 assembler_block_height = 6;
}

// Sent by an originator to reject a pre-dispatch request. The rejection_reason field indicates why.
message PreDispatchRejection {
    string transaction_id = 1;
    string request_id = 2;
    string contract_address = 3;
    RejectionReason rejection_reason = 4;
}

message CoordinatorHeartbeatNotification {
    string from = 1;
    string contract_address = 2; // Represent as hex address?
    bytes coordinator_snapshot = 3;
}
