# ConfigMap holds the test config. Update the node endpoints to match your cluster.
apiVersion: v1
kind: ConfigMap
metadata:
  name: noto-pente-tracker-config
  namespace: kdplyz-dev-besu
data:
  test-config.yaml: |
    nodes:
      - name: pnode2
        httpEndpoint: https://r-e04o5wqw86-pnr:8548
        wsEndpoint: wss://r-e04o5wqw86-pnr:8549
      - name: pnode1
        httpEndpoint: https://r-gpei63anmd-pnr:8548
        wsEndpoint: wss://r-gpei63anmd-pnr:8549
      - name: admin
        httpEndpoint: https://r-5cdc29xem9-pnr:8548
        wsEndpoint: wss://r-5cdc29xem9-pnr:8549

    instances:
      - name: noto-pente-tracker-test
        test:
          name: noto_pente_tracker
          workers: 4
        maxSubmissionsPerSecond: 5
        completionTimeout: 5m
        maxActions: 10000000
        length: 72h

    wsConfig:
      httpclientconfig:
        tls:
          enabled: true
          cafile: /mtls/ca.crt
          certfile: /mtls/tls.crt
          keyfile: /mtls/tls.key

    httpConfig:
      tls:
        enabled: true
        cafile: /mtls/ca.crt
        certfile: /mtls/tls.crt
        keyfile: /mtls/tls.key

    logLevel: info
    logEvents: false

---
apiVersion: batch/v1
kind: Job
metadata:
  name: noto-pente-tracker
  namespace: kdplyz-dev-besu
spec:
  # Do not restart on failure — surface errors in pod logs instead
  backoffLimit: 0
  template:
    metadata:
      labels:
        platform.kaleido.io/environment: e-tyivyl0azc
    spec:
      restartPolicy: Never
      containers:
        - name: pldtest
          image: ghcr.io/lfdt-paladin/paladin-test-cli:e6e67684031ba9819acb5b8b1a2254281253e667-amd64@sha256:324340e8d71217bbede2cafb97a2138c3f830ad0ca5caf4a3ec1c3d5ea51dfdd
          args:
            - run
            - -c
            - /config/test-config.yaml
            - -i
            - "0"
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: mtls
              mountPath: /mtls
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: noto-pente-tracker-config
        - name: mtls
          secret:
            secretName: r-e04o5wqw86-pnr-mtls
            items:
              - key: ca.crt
                path: ca.crt
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
