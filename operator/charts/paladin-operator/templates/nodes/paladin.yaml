{{- if (eq .Values.mode "devnet") }}

{{- $prefix := .Values.paladin.nodeNamePrefix }}
{{- $besuPrefix := .Values.besu.nodeNamePrefix }}
{{- $basePort := .Values.paladin.baseNodePort }}

{{- $paladinCount := include "paladin-operator.paladinNodeCount" . | int }}
{{- $besuCount := include "paladin-operator.besuNodeCount" . | int }}
{{- $root := . }}

{{- range $i, $_ := until $paladinCount }}
{{- $name := printf "%s%d" $prefix (add $i 1) }}
{{- $besuName := printf "%s%d" $besuPrefix 1 }}
{{- if ne $besuCount 1 }}
{{-   $besuIndex := mod $i $besuCount }}
{{-   $besuIndex = add $besuIndex 1 }}
{{-   $besuName = printf "%s%d" $besuPrefix $besuIndex }}
{{- end }}
apiVersion: core.paladin.io/v1alpha1
kind: Paladin
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
spec:
  config: |
    log:
      level: debug
    publicTxManager:
      gasLimit:
        gasEstimateFactor: 2.0
  database:
    mode: sidecarPostgres
    migrationMode: auto
  {{- if $root.Values.paladin.logPersistence.enabled }}
  logPersistence:
    enabled: true
    path: {{ $root.Values.paladin.logPersistence.path | default "/app/logs/paladin.log" | quote }}
    {{- with $root.Values.paladin.logPersistence.pvcTemplate }}
    pvcTemplate:
{{ toYaml . | nindent 6 }}
    {{- end }}
    {{- with $root.Values.paladin.logPersistence.file }}
    file:
{{ toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
  baseLedgerEndpoint:
    type: local
    local:
      nodeName: {{ $besuName }}
  secretBackedSigners:
    - name: signer-1
      secret: {{ $name }}.keys
      type: autoHDWallet
      keySelector: .*
  domains:
    - labelSelector:
        matchLabels:
          paladin.io/domain-name: noto
    - labelSelector:
        matchLabels:
          paladin.io/domain-name: zeto
    - labelSelector:
        matchLabels:
          paladin.io/domain-name: pente
  registries:
    - labelSelector:
        matchLabels:
          paladin.io/registry-name: evm-registry
  transports:
    - name: grpc
      plugin:
        type: c-shared
        library: /app/transports/libgrpc.so
      configJSON: |
        {
          "port": 9000,
          "address": "0.0.0.0"
        }
      ports:
        - name: transport-grpc
          port: 9000
          targetPort: 9000
      tls:
        secretName: paladin-{{ $name }}-mtls
        certName: paladin-{{ $name }}-mtls
  service:
    type: NodePort
    ports:
      - name: rpc-http
        port: 8548
        nodePort: {{ add $basePort (mul $i 100) }}
      - name: rpc-ws
        port: 8549
        nodePort: {{ add $basePort (add (mul $i 100) 1) }}
      - name: metrics
        port: 6100
        nodePort: {{ add $basePort (add (mul $i 100) 2) }}
---
{{- end }}
{{- end }}
